# coturn configuration for anontweet WebRTC relay.
#
# Run coturn on the SAME machine that runs the live-server (the one friends
# reach via anontweet.duckdns.org). It serves TURN-over-TLS on port 443 so the
# relay works even behind restrictive networks / firewalls (e.g. China).
#
# NOTE: Caddy already uses :443 for signaling. To avoid a port conflict,
# coturn's TURN-over-TLS runs on :8443 here (commonly allowed through Chinese
# firewalls). If you prefer coturn on 443, move Caddy to another port first.
#
# The TLS cert/key below should be the SAME duckdns cert the live-server uses
# (cert.pem / key.pem). Point the paths at those files.

listening-port=3478
tls-listening-port=8443

# Listen on all interfaces
listening-ip=0.0.0.0
relay-ip=0.0.0.0

# Use the duckdns certificate (same as live-server)
# On the live-server box point these at your duckdns cert.pem / key.pem.
# On WSL dev the working paths are the live-server files mounted at:
cert=/mnt/c/Users/munee/Desktop/work/instagram/live-server/cert.pem
pkey=/mnt/c/Users/munee/Desktop/work/instagram/live-server/key.pem

# Authentication — static long-term credential via user=. MUST match
# NEXT_PUBLIC_TURN_USER / NEXT_PUBLIC_TURN_CRED in .env.
# NOTE: coturn has no static-user/static-password directives; use user= instead.
lt-cred-mech
user=anonturn:I_hateyou2

# Realm (used in TURN messages)
realm=anontweet.duckdns.org

# Allow relay to any peer (needed for WebRTC)
no-stdout-log
log-file=/var/log/turn.log
verbose

# Security / limits
max-port=65535
min-port=49152

# Don't require certificate for the web admin
no-tlsv1
no-tlsv1_1
